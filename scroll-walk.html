<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll-Driven Walk Cycle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 30000px;
      background: linear-gradient(180deg, #f0ece4 0%, #ddd6c8 100%);
      overflow-x: hidden;
    }

    .scroll-hint {
      position: fixed;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      color: #999;
      letter-spacing: 0.5px;
      z-index: 10;
      pointer-events: none;
      animation: pulse 2s ease-in-out infinite;
      transition: opacity 0.5s ease;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* Background world canvas — sits behind everything */
    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    /* Canvas is the character — centered, no CSS flip tricks needed */
    #character {
      position: fixed;
      top: 72%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: block;
      z-index: 2;
    }
    /* Smooth, springy lift used while climbing steps. Only enabled
       AFTER the fall completes so it doesn't interfere with that animation. */
    #character.walking {
      transition: top 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .ground {
      position: fixed;
      top: calc(72% + 137px);
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(0, 0, 0, 0.06);
      pointer-events: none;
      z-index: 3;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: #8a7e6b;
      z-index: 100;
    }

    /* ---- Landing title ---- */
    #landingTitle {
      position: fixed;
      top: 8%;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 700px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: clamp(28px, 5.5vw, 56px);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.5px;
      color: #2c2820;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    #landingTitle.show {
      opacity: 1;
    }

    /* ---- Generic phase text (used for prompts that fade in/out at scrollY ranges) ---- */
    .phase-text {
      position: fixed;
      top: 18%;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 720px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: clamp(24px, 4.5vw, 44px);
      font-weight: 700;
      line-height: 1.25;
      letter-spacing: -0.3px;
      color: #2c2820;
      text-align: center;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
    }
    .phase-text.show {
      opacity: 1;
    }

    /* ---- Tool bubbles ---- */
    /* A halo of "what we offer" pills that pop up around the character once
       they've finished climbing. Each one fades + scales in (springy) when
       its scrollY threshold is crossed. */
    #toolBubbles {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 5;
      pointer-events: none;
    }
    .tool-bubble {
      position: absolute;
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #2c2820;
      padding: 12px;
      box-sizing: border-box;
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.55);
      transition: opacity 0.45s ease, transform 0.55s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .tool-bubble.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .tool-bubble.featured {
      width: 170px;
      height: 170px;
      background: linear-gradient(140deg, #ffffff 0%, #f5efe2 100%);
      box-shadow: 0 10px 30px rgba(184, 128, 96, 0.22);
      font-size: 14px;
    }
    .tool-bubble .icon {
      font-size: 38px;
      line-height: 1;
      margin-bottom: 6px;
    }
    .tool-bubble.featured .icon {
      font-size: 46px;
    }
    .tool-bubble .label {
      line-height: 1.2;
    }

    /* ---- Stress HUD ---- */
    #stressHud {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    /* Notification bell — top-right */
    .stress-notif {
      position: absolute;
      top: 30px;
      right: 40px;
      display: flex;
      align-items: flex-start;
    }
    .stress-notif .bell {
      font-size: 48px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.15));
      animation: bellShake 0.4s ease-in-out infinite;
      transform-origin: top center;
    }
    @keyframes bellShake {
      0%, 100% { transform: rotate(0deg); }
      25%      { transform: rotate(8deg); }
      75%      { transform: rotate(-8deg); }
    }
    .stress-notif .badge {
      position: relative;
      top: -4px;
      left: -14px;
      min-width: 26px;
      height: 26px;
      line-height: 26px;
      padding: 0 7px;
      border-radius: 13px;
      background: #e53935;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
      box-shadow: 0 2px 6px rgba(229,57,53,0.4);
    }

    /* Emails — top-left */
    .stress-emails {
      position: absolute;
      top: 30px;
      left: 30px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 260px;
    }
    .email-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.92);
      border-radius: 10px;
      padding: 8px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: #333;
      opacity: 0;
      transform: translateX(-20px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .email-row.show {
      opacity: 1;
      transform: translateX(0);
    }
    .email-row .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .email-row .dot.dot-slack    { background: #E01E5A; }
    .email-row .dot.dot-email    { background: #4285F4; }
    .email-row .dot.dot-calendar { background: #34A853; }
    .email-row .dot.dot-text     { background: #FBBC04; }
    .email-row .email-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .email-row .email-time {
      margin-left: auto;
      color: #999;
      font-size: 10px;
      flex-shrink: 0;
    }

    /* Chart — full background behind everything */
    .stress-chart {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60%;
      pointer-events: none;
    }
    .stress-chart canvas {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="progress-bar" id="progressBar"></div>

  <!-- Background world layer — objects scroll behind the character -->
  <canvas id="bgCanvas"></canvas>

  <!-- Canvas replaces the img/div approach — we draw each frame directly -->
  <canvas id="character" width="200" height="274"></canvas>

  <div id="landingTitle">Steps to success are both big and small</div>

  <!-- Post-stress phase text — fades in once the notification noise is gone -->
  <div id="climbText" class="phase-text">And then the steps get bigger.</div>

  <div class="ground"></div>
  <div class="scroll-hint" id="scrollHint" style="opacity:0">&#8595; Scroll to take your first step &#8595;</div>

  <!-- Tool bubbles — appear in a halo around the character once climbing is done.
       Positions are inline styles for easy tweaking; show order is set by
       data-show-at (scrollY threshold) on each element. -->
  <div id="toolBubbles">
    <div class="tool-bubble featured" data-show-at="24200" style="top: 18%; left: 50%;">
      <div class="icon">&#129302;</div>
      <div class="label">AI&nbsp;Insights</div>
    </div>
    <div class="tool-bubble" data-show-at="24500" style="top: 30%; left: 24%;">
      <div class="icon">&#128203;</div>
      <div class="label">Personalized&nbsp;Plans</div>
    </div>
    <div class="tool-bubble" data-show-at="24800" style="top: 30%; left: 76%;">
      <div class="icon">&#127919;</div>
      <div class="label">Goal&nbsp;Tracking</div>
    </div>
    <div class="tool-bubble" data-show-at="25100" style="top: 56%; left: 14%;">
      <div class="icon">&#128260;</div>
      <div class="label">Habit&nbsp;Building</div>
    </div>
    <div class="tool-bubble" data-show-at="25400" style="top: 56%; left: 86%;">
      <div class="icon">&#129517;</div>
      <div class="label">Expert&nbsp;Guidance</div>
    </div>
  </div>

  <!-- Stress HUD — appears when walking right -->
  <div id="stressHud">
    <!-- Notification bell -->
    <div class="stress-notif">
      <div class="bell">&#128276;</div>
      <div class="badge" id="notifCount">1</div>
    </div>

    <!-- Emails stacking up -->
    <div class="stress-emails" id="emailStack"></div>

    <!-- Rising chart — full background -->
    <div class="stress-chart">
      <canvas id="stressChartCanvas"></canvas>
    </div>
  </div>

  <script>
    // ============================================================
    // BACKGROUND WORLD SYSTEM
    // ============================================================
    // How it works:
    //   cameraX tracks where in the world the character "is".
    //   Each scroll pixel moves cameraX by WORLD_SPEED units.
    //   Walking right (scroll down) → cameraX increases → objects slide LEFT.
    //   Walking left  (scroll up)   → cameraX decreases → objects slide RIGHT.
    //
    //   Screen position of an object:
    //     screenX = obj.worldX - cameraX * obj.parallaxFactor
    //
    //   worldX is the object's left-edge position when cameraX = 0,
    //   i.e. its initial screen X at game start. Positive = right of center,
    //   negative = left of center.
    //
    //   parallaxFactor: 1.0 = solid foreground speed, <1.0 = further back.
    //
    // To add more objects just call addBgObject({ ... }) — see bottom of script.
    // ============================================================

    const bgCanvas = document.getElementById('bgCanvas');
    const bgCtx    = bgCanvas.getContext('2d');

    let cameraX = 0;
    const WORLD_SPEED = 0.3; // world pixels moved per scroll pixel

    // After the staircase, the character stops walking, turns to face the
    // viewer, and tool bubbles pop up around them. The world camera freezes
    // at this point so background objects stop sliding past.
    const TOOLS_PHASE_START = 24000;            // scrollY where freeze begins
    const FREEZE_CAMERA_X   = TOOLS_PHASE_START * WORLD_SPEED;

    function getGroundY() {
      // Must match the CSS .ground rule: top: calc(72% + 137px)
      return window.innerHeight * 0.72 + 137;
    }

    function resizeBgCanvas() {
      bgCanvas.width  = window.innerWidth;
      bgCanvas.height = window.innerHeight;
    }
    resizeBgCanvas();

    // Registry of background objects
    // Each entry: { img, worldX, displayHeight, yOffset, parallaxFactor, loaded }
    //   yOffset: pixels to raise the object above the ground line (default 0 = sits on ground)
    const bgObjects = [];

    function addBgObject(config) {
      const obj = {
        img:            new Image(),
        worldX:         config.worldX,
        displayHeight:  config.displayHeight,
        yOffset:        config.yOffset        ?? 0,
        parallaxFactor: config.parallaxFactor ?? 1.0,
        opacity:        config.opacity        ?? 1.0,
        loaded:         false
      };
      obj.img.onload = () => { obj.loaded = true; drawBackground(); };
      obj.img.src    = config.src;
      bgObjects.push(obj);
      return obj;
    }

    function drawBackground() {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      const groundY = getGroundY();

      // Steps render before sprite-based objects so any future props can sit on top
      drawSteps();

      for (const obj of bgObjects) {
        if (!obj.loaded) continue;

        const dh = obj.displayHeight;
        const dw = (obj.img.naturalWidth / obj.img.naturalHeight) * dh;

        // Apply parallax: objects with factor < 1 move slower (feel further away)
        const screenX = obj.worldX - cameraX * obj.parallaxFactor;
        const screenY = groundY - dh - obj.yOffset; // yOffset lifts the object above ground

        // Skip if fully off-screen (left or right)
        if (screenX + dw < 0 || screenX > bgCanvas.width) continue;

        bgCtx.globalAlpha = obj.opacity;
        bgCtx.drawImage(obj.img, screenX, screenY, dw, dh);
        bgCtx.globalAlpha = 1.0;
      }
    }

    // ---- Register world objects ----
    // The office building starts just off the right edge of the screen.
    // As soon as the character walks right it slides in from the right.
    addBgObject({
      src:            '24758475_office_03 [Converted].png',
      worldX:         window.innerWidth + 80,
      displayHeight:  115,           // small background window
      yOffset:        180,           // float it up above the ground line
      parallaxFactor: 0.4,           // slow parallax — feels distant
      opacity:        0.7
    });
    // ---- Add more objects here with addBgObject({ ... }) ----

    // ============================================================
    // STAIRCASE — character climbs ascending steps after the stress phase
    // ============================================================
    // Each step lives at a worldX with a width and a height.
    // Steps are stacked back-to-back so the character can step from one
    // straight onto the next without any gap.
    //
    // Tuning rationale:
    //   STEPS_FIRST_WORLD_X is set so the first step enters the right edge
    //   of the screen at scrollY ≈ 14500 (just as the stress HUD is gone
    //   and the climb text has appeared).
    //
    //   cameraX = scrollY * WORLD_SPEED   (WORLD_SPEED = 0.3)
    //   "step enters right edge" ↔ screenX_step = innerWidth
    //                            ↔ worldX = innerWidth + cameraX
    // ============================================================

    const STEPS_FIRST_SCROLL_Y = 14500;
    const STEPS_FIRST_WORLD_X  = window.innerWidth + STEPS_FIRST_SCROLL_Y * WORLD_SPEED;

    // Each step is a "life pillar" that the character climbs. Heights are
    // expressed as fractions of the tallest allowed step so the staircase
    // automatically fits inside the viewport on any reasonable screen size
    // (the character canvas is 274px tall and must stay visible above the
    // tallest step).
    //
    // Color picks are warm earth tones in the same family as the page bg
    // (#ddd6c8) so they read as distinct pillars without clashing. The top
    // highlight is a slightly lighter sibling of each face color.
    const STEP_WIDTH = 320;
    const STEP_DEFS = [
      { label: 'Health',        heightFrac: 0.14, face: '#a8b89a', topColor: '#bccaad' },
      { label: 'Knowledge',     heightFrac: 0.30, face: '#c4b78f', topColor: '#d6cba8' },
      { label: 'Relationships', heightFrac: 0.50, face: '#c5a797', topColor: '#d7bcae' },
      { label: 'Wealth',        heightFrac: 0.74, face: '#c4a96b', topColor: '#d6c089' },
      { label: 'Legacy',        heightFrac: 1.00, face: '#b78060', topColor: '#cc9a7d' },
    ];

    // Max step height = how high the character can be lifted while keeping
    // its head in the viewport.
    //   character canvas top  = ih*0.72 - lift - 137  (must be >= headroom)
    //   ⇒ maxLift = ih*0.72 - 137 - headroom
    // The character canvas is 274px tall (half-height = 137).
    function computeMaxStepHeight() {
      return Math.max(180, window.innerHeight * 0.72 - 137 - 30);
    }

    const steps = [];
    function buildSteps() {
      steps.length = 0;
      const maxH = computeMaxStepHeight();
      let wx = STEPS_FIRST_WORLD_X;
      for (const def of STEP_DEFS) {
        steps.push({
          worldX:   wx,
          width:    STEP_WIDTH,
          height:   Math.round(maxH * def.heightFrac),
          label:    def.label,
          face:     def.face,
          topColor: def.topColor
        });
        wx += STEP_WIDTH;
      }
    }
    buildSteps();

    function drawSteps() {
      const groundY = getGroundY();
      for (const s of steps) {
        const screenX = s.worldX - cameraX; // parallax 1.0 — matches walk speed
        if (screenX + s.width < 0 || screenX > bgCanvas.width) continue;

        const top = groundY - s.height;

        // Step face (the front "wall" the label sits on)
        bgCtx.fillStyle = s.face;
        bgCtx.fillRect(screenX, top, s.width, s.height);

        // Top surface highlight (where character's feet land)
        bgCtx.fillStyle = s.topColor;
        bgCtx.fillRect(screenX, top, s.width, 6);

        // Right-side shadow gives a subtle 3D feel as steps stack
        bgCtx.fillStyle = 'rgba(0,0,0,0.10)';
        bgCtx.fillRect(screenX + s.width - 4, top, 4, s.height);

        // ---- Label drawn on the front face ----
        // Vertical position: centered on the step's front face. This keeps
        // it BELOW the character canvas (which sits on top of the step) so
        // the label is never obscured by the character's body.
        // Font scales up gently with step height so taller pillars feel
        // more important without overflowing the smallest step.
        const fontPx = s.height < 100 ? 17 : s.height < 200 ? 21 : 26;
        bgCtx.font = `700 ${fontPx}px "Segoe UI", system-ui, sans-serif`;
        bgCtx.textAlign    = 'center';
        bgCtx.textBaseline = 'middle';
        bgCtx.fillStyle    = 'rgba(255, 255, 255, 0.95)';
        bgCtx.fillText(s.label, screenX + s.width / 2, top + s.height / 2);
      }
    }

    // The character is rendered at left:50% and feet rest at top:72%+137px.
    // Its world X equals cameraX + innerWidth/2 (since parallax 1.0).
    // Returns how many pixels the character should be lifted to stand on the
    // step they're currently over — or 0 if they're not over any step.
    function getCharacterLift() {
      const characterWorldX = cameraX + window.innerWidth / 2;
      for (const s of steps) {
        if (characterWorldX >= s.worldX && characterWorldX < s.worldX + s.width) {
          return s.height;
        }
      }
      return 0;
    }

    function applyCharacterLift() {
      // Only lift once the fall sequence has handed off to walking
      if (!canvas.classList.contains('walking')) return;
      const lift = getCharacterLift();
      canvas.style.top = lift > 0 ? `calc(72% - ${lift}px)` : '72%';
    }

    // ============================================================

    const canvas = document.getElementById('character');
    const ctx    = canvas.getContext('2d');

    const displayW = 200;
    const displayH = 274;

    const TOTAL_FRAMES   = 8;
    const NATIVE_SHEET_W = 4728;
    const NATIVE_SHEET_H = 817;
    const NATIVE_FRAME_W = NATIVE_SHEET_W / TOTAL_FRAMES;
    const PIXELS_PER_FRAME = 200;

    // --- Image assets ---
    const idleImg    = new Image();
    const falling1   = new Image();
    const falling2   = new Image();
    idleImg.src      = 'Facing-01.png';
    falling1.src     = 'Falling1.png';
    falling2.src     = 'Falling2.png';

    // Track how many assets have loaded before starting the fall
    let assetsLoaded = 0;
    const TOTAL_ASSETS = 4; // falling1, falling2, idleImg, sprite
    function onAssetLoaded() {
      assetsLoaded++;
      if (assetsLoaded === TOTAL_ASSETS) startFall();
    }
    falling1.onload  = onAssetLoaded;
    falling2.onload  = onAssetLoaded;
    idleImg.onload   = onAssetLoaded;

    const sprite  = new Image();
    sprite.src    = 'Character4.png';

    // framesLeft = facing left (scroll down). Facing right is drawn by re-flipping at draw time.
    const framesLeft  = [];
    const framesPhone = []; // phone-checking walk sprite, same layout
    let   usePhoneSprite = false;

    // Shared baking function — builds flipped frames from any sprite sheet image
    function bakeFrames(srcImg, targetArray, callback) {
      const centers = [];
      for (let i = 0; i < TOTAL_FRAMES; i++) {
        const tmp   = document.createElement('canvas');
        tmp.width   = Math.ceil(NATIVE_FRAME_W);
        tmp.height  = NATIVE_SHEET_H;
        const tctx  = tmp.getContext('2d');
        tctx.drawImage(srcImg, i * NATIVE_FRAME_W, 0, NATIVE_FRAME_W, NATIVE_SHEET_H, 0, 0, tmp.width, NATIVE_SHEET_H);

        const data = tctx.getImageData(0, 0, tmp.width, NATIVE_SHEET_H).data;
        let minX = tmp.width, maxX = 0;
        for (let y = 0; y < NATIVE_SHEET_H; y++) {
          for (let x = 0; x < tmp.width; x++) {
            if (data[(y * tmp.width + x) * 4 + 3] > 10) {
              if (x < minX) minX = x;
              if (x > maxX) maxX = x;
            }
          }
        }
        centers.push((minX + maxX) / 2);
      }

      const avgCenter  = centers.reduce((a, b) => a + b, 0) / centers.length;
      const scale      = displayH / NATIVE_SHEET_H;
      const frameDrawW = Math.ceil(NATIVE_FRAME_W * scale);

      for (let i = 0; i < TOTAL_FRAMES; i++) {
        const offset = (centers[i] - avgCenter) * scale;
        const fc     = document.createElement('canvas');
        fc.width     = displayW;
        fc.height    = displayH;
        const fctx   = fc.getContext('2d');
        fctx.save();
        fctx.translate(displayW, 0);
        fctx.scale(-1, 1);
        fctx.drawImage(srcImg, i * NATIVE_FRAME_W, 0, NATIVE_FRAME_W, NATIVE_SHEET_H, -offset, 0, frameDrawW, displayH);
        fctx.restore();
        targetArray.push(fc);
      }
      if (callback) callback();
    }

    sprite.onload = () => {
      bakeFrames(sprite, framesLeft, onAssetLoaded);
    };

    // Phone sprite — loads independently, does NOT gate the fall sequence
    const phoneSprite = new Image();
    phoneSprite.src   = 'CheckPhone.png';
    phoneSprite.onload = () => {
      bakeFrames(phoneSprite, framesPhone, null);
    };

    // ---- Fall animation ----
    let scrollEnabled = false; // locked until landing is complete

    function startFall() {
      const groundY   = window.innerHeight * 0.72 - displayH / 2;
      let y           = -displayH * 1.5;
      let vy          = 0;
      const gravity   = 0.12;
      const bounce    = 0;
      let bounceCount = 0;
      const MAX_BOUNCES = 0;
      let fallFrame   = 0;
      let lastFallFrameTime = 0;
      const FALL_FRAME_MS   = 70;

      // Override CSS centering — we'll control top in px during fall
      canvas.style.top       = 'auto';
      canvas.style.transform = 'translateX(-50%)';

      function fallTick(timestamp) {
        // Alternate between Falling1 and Falling2
        if (timestamp - lastFallFrameTime > FALL_FRAME_MS) {
          fallFrame = fallFrame === 0 ? 1 : 0;
          lastFallFrameTime = timestamp;
        }

        vy += gravity;
        y  += vy;

        if (y >= groundY) {
          y  = groundY;
          vy = 0;
        }

        canvas.style.top = y + 'px';

        ctx.clearRect(0, 0, displayW, displayH);
        ctx.drawImage(fallFrame === 0 ? falling1 : falling2, 0, 0, displayW, displayH);

        // Stop when landed
        if (y >= groundY) {
          canvas.style.top       = '72%';
          canvas.style.transform = 'translate(-50%, -50%)';
          // Enable smooth lift transition only AFTER fall has snapped into place
          canvas.classList.add('walking');
          // Show idle frame and unlock scroll
          ctx.clearRect(0, 0, displayW, displayH);
          ctx.drawImage(idleImg, 0, 0, displayW, displayH);
          scrollEnabled = true;
          // Fade in title and scroll hint after landing
          setTimeout(() => {
            document.getElementById('landingTitle').classList.add('show');
          }, 300);
          setTimeout(() => {
            document.getElementById('scrollHint').style.opacity = '';
          }, 800);
          return;
        }

        requestAnimationFrame(fallTick);
      }

      requestAnimationFrame(fallTick);
    }

    let currentFrame     = 0;
    let scrollAccum      = 0; // accumulated scroll px — drives frame advancement
    let scrollDir        = 'down';
    let lastScrollY      = 0;
    let isFacing         = false;
    let dirChangeScrollY = 0;
    const FACING_THRESHOLD = 100; // px to scroll in new direction before walking starts

    function drawFacing() {
      ctx.clearRect(0, 0, displayW, displayH);
      ctx.drawImage(idleImg, 0, 0, displayW, displayH);
    }

    function drawFrame(index) {
      ctx.clearRect(0, 0, displayW, displayH);
      const frames = (usePhoneSprite && framesPhone.length) ? framesPhone : framesLeft;
      const fc = frames[index];
      if (!fc) return;
      if (scrollDir === 'down') {
        ctx.drawImage(fc, 0, 0);
      } else {
        ctx.save();
        ctx.translate(displayW, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(fc, 0, 0);
        ctx.restore();
      }
    }

    const progressBar = document.getElementById('progressBar');
    const scrollHint  = document.getElementById('scrollHint');
    let totalScroll   = document.body.scrollHeight - window.innerHeight;
    let hintHidden    = false;
    let rafPending    = false;

    function tick() {
      rafPending = false;
      const scrollY = window.scrollY;

      // Always redraw background (camera may have moved)
      drawBackground();

      // Lift the character onto whichever step they're currently on
      applyCharacterLift();

      // Back at very top — idle frame
      if (scrollY === 0) {
        drawFacing();
        currentFrame = 0;
        scrollAccum  = 0;
        lastScrollY  = 0;
        isFacing     = false;
        return;
      }

      // Tools phase — character has finished the climb. Stop walking, face
      // the viewer, and let the bubbles do the talking.
      if (scrollY >= TOOLS_PHASE_START) {
        drawFacing();
        return;
      }

      // Show facing frame on direction change until threshold is exceeded.
      if (isFacing) {
        const scrolledSinceChange = Math.abs(scrollY - dirChangeScrollY);
        if (scrolledSinceChange < FACING_THRESHOLD) {
          drawFacing();
          return;
        }
        isFacing = false;
      }

      // Advance one frame for every PIXELS_PER_FRAME of scroll distance.
      // This ties the animation directly to how far the user has scrolled,
      // so fast scrolling = fast walk, slow scrolling = slow walk, stopped = stopped.
      while (scrollAccum >= PIXELS_PER_FRAME) {
        currentFrame = (currentFrame + 1) % TOTAL_FRAMES;
        scrollAccum -= PIXELS_PER_FRAME;
      }

      drawFrame(currentFrame);
    }

    window.addEventListener('scroll', () => {
      if (!scrollEnabled) {
        window.scrollTo(0, 0);
        return;
      }

      const scrollY     = window.scrollY;
      const scrollDelta = scrollY - lastScrollY;

      // Accumulate absolute scroll distance to drive walk frame advancement
      scrollAccum += Math.abs(scrollDelta);

      // Move the world camera with walk direction:
      //   scroll down (walking right) → cameraX increases → objects slide LEFT  ✓
      //   scroll up   (walking left)  → cameraX decreases → objects slide RIGHT ✓
      // Clamped so the world freezes once the character enters the tools phase.
      // Direct mapping (scrollY * WORLD_SPEED) keeps cameraX in lockstep with
      // scrollY even after the clamp releases on scroll-up.
      cameraX = Math.min(scrollY * WORLD_SPEED, FREEZE_CAMERA_X);

      const newDir  = scrollY >= lastScrollY ? 'down' : 'up';

      // Direction changed — show facing frame until threshold
      if (newDir !== scrollDir) {
        scrollDir        = newDir;
        dirChangeScrollY = scrollY;
        isFacing         = true;
      }

      lastScrollY = scrollY;

      progressBar.style.width = (scrollY / totalScroll * 100) + '%';

      if (!hintHidden && scrollY > 50) {
        scrollHint.style.opacity = '0';
        document.getElementById('landingTitle').classList.remove('show');
        hintHidden = true;
      } else if (hintHidden && scrollY <= 50) {
        scrollHint.style.opacity = '1';
        document.getElementById('landingTitle').classList.add('show');
        hintHidden = false;
      }

      if (!rafPending) {
        rafPending = true;
        requestAnimationFrame(tick);
      }
    }, { passive: true });

    window.addEventListener('resize', () => {
      totalScroll = document.body.scrollHeight - window.innerHeight;
      resizeBgCanvas();
      buildSteps();      // step heights re-fit the new viewport
      drawBackground();
      resizeStressChart();
    });

    // ============================================================
    // STRESS HUD — builds anxiety as you walk right (scroll down)
    // ============================================================

    const stressHud       = document.getElementById('stressHud');
    const notifCountEl    = document.getElementById('notifCount');
    const emailStackEl    = document.getElementById('emailStack');
    const stressChartCvs  = document.getElementById('stressChartCanvas');
    const stressChartCtx  = stressChartCvs.getContext('2d');

    function resizeStressChart() {
      stressChartCvs.width  = window.innerWidth;
      stressChartCvs.height = Math.floor(window.innerHeight * 0.6);
    }
    resizeStressChart();

    const STRESS_START = 800;    // scrollY where stress HUD fades in
    const STRESS_FULL  = 8000;  // scrollY where everything is maxed out
    const STRESS_END   = 10000; // scrollY where HUD starts fading away
    const STRESS_GONE  = 13000; // scrollY where HUD is completely gone

    const emails = [
      { from: 'Slack',     subject: 'Need this ASAP…',              time: '8:01 AM' },
      { from: 'Email',     subject: 'Updated numbers attached…',    time: '8:04 AM' },
      { from: 'Calendar',  subject: 'Budget review at 2PM…',        time: '8:07 AM' },
      { from: 'Text',      subject: 'Did you move money yet…',      time: '8:09 AM' },
      { from: 'Slack',     subject: 'Client asking again…',         time: '8:12 AM' },
      { from: 'Email',     subject: 'Investment deck inside…',      time: '8:14 AM' },
      { from: 'Calendar',  subject: 'Tax deadline coming up…',      time: '8:16 AM' },
      { from: 'Text',      subject: 'Can you call me quick…',       time: '8:18 AM' },
      { from: 'Slack',     subject: 'We have a fire to put out…',   time: '8:21 AM' },
      { from: 'Email',     subject: 'Following up on this…',        time: '8:23 AM' },
    ];

    // Pre-build email DOM rows with color-coded dots
    const dotClassMap = { Slack: 'dot-slack', Email: 'dot-email', Calendar: 'dot-calendar', Text: 'dot-text' };
    emails.forEach(e => {
      const row = document.createElement('div');
      row.className = 'email-row';
      const dotCls = dotClassMap[e.from] || 'dot-email';
      row.innerHTML =
        '<div class="dot ' + dotCls + '"></div>' +
        '<span class="email-text"><b>' + e.from + '</b> — ' + e.subject + '</span>' +
        '<span class="email-time">' + e.time + '</span>';
      emailStackEl.appendChild(row);
    });
    const emailRows = emailStackEl.querySelectorAll('.email-row');

    let lastStressT = -1;

    function updateStressHud() {
      const sy = window.scrollY;

      // Completely outside the stress zone — reset sprite
      if (sy < STRESS_START || sy > STRESS_GONE) {
        stressHud.style.opacity = '0';
        usePhoneSprite = false;
        lastStressT = -1;
        return;
      }

      // t: build-up 0→1
      const t = Math.min((sy - STRESS_START) / (STRESS_FULL - STRESS_START), 1);

      // fadeOut: 1→0 after peak
      const fadeOut = sy <= STRESS_END ? 1
        : 1 - Math.min((sy - STRESS_END) / (STRESS_GONE - STRESS_END), 1);

      stressHud.style.opacity = String(fadeOut);

      // Avoid redundant DOM thrashing during fade-out (content stays at peak)
      const tBucket = Math.floor(t * 200);
      if (tBucket === lastStressT) return;
      lastStressT = tBucket;

      // --- Notification counter ---
      const notifVal = Math.floor(1 + t * 98);
      notifCountEl.textContent = notifVal;

      // --- Emails ---
      const visibleEmails = Math.floor(t * emails.length);
      emailRows.forEach((row, i) => {
        row.classList.toggle('show', i < visibleEmails);
      });

      // Switch to phone sprite after the 3rd email appears,
      // revert to normal once the HUD has fully faded out (handled above)
      usePhoneSprite = (visibleEmails >= 3) && (sy < STRESS_GONE);

      // --- Chart ---
      drawStressChart(t);
    }

    function drawStressChart(t) {
      const w = stressChartCvs.width;
      const h = stressChartCvs.height;
      const ctx2 = stressChartCtx;
      ctx2.clearRect(0, 0, w, h);

      const points = 40;
      const visiblePts = Math.max(2, Math.floor(t * points));

      // Build the line path
      function traceLine() {
        ctx2.moveTo(0, h);
        for (let i = 0; i < visiblePts; i++) {
          const px = (i / (points - 1)) * w;
          const baseY = i / (points - 1);
          const jitter = Math.sin(i * 2.7) * 0.10 + Math.cos(i * 4.1) * 0.06 + Math.sin(i * 1.3) * 0.04;
          const val = Math.min(baseY + jitter, 1);
          const py = h - val * h;
          ctx2.lineTo(px, py);
        }
      }

      // Fill under the line — soft gradient rising from bottom
      ctx2.beginPath();
      traceLine();
      const lastX = ((visiblePts - 1) / (points - 1)) * w;
      ctx2.lineTo(lastX, h);
      ctx2.closePath();

      const grad = ctx2.createLinearGradient(0, 0, 0, h);
      grad.addColorStop(0, 'rgba(229, 57, 53, 0.18)');
      grad.addColorStop(1, 'rgba(229, 57, 53, 0.02)');
      ctx2.fillStyle = grad;
      ctx2.fill();

      // Stroke the line
      ctx2.beginPath();
      traceLine();
      ctx2.strokeStyle = 'rgba(229, 57, 53, 0.25)';
      ctx2.lineWidth = 2;
      ctx2.lineJoin = 'round';
      ctx2.stroke();
    }

    window.addEventListener('scroll', updateStressHud, { passive: true });

    // ============================================================
    // CLIMB-PHASE TEXT — appears once notifications are gone, fades
    // out shortly after the character starts climbing the first step.
    // ============================================================
    const CLIMB_TEXT_SHOW_START = 13200; // just after stress HUD finishes fading
    const CLIMB_TEXT_SHOW_END   = 17000; // just after first step is climbed
    const climbTextEl = document.getElementById('climbText');

    function updateClimbText() {
      const sy = window.scrollY;
      const visible = sy >= CLIMB_TEXT_SHOW_START && sy <= CLIMB_TEXT_SHOW_END;
      climbTextEl.classList.toggle('show', visible);
    }

    window.addEventListener('scroll', updateClimbText, { passive: true });

    // ============================================================
    // TOOL BUBBLES — pop up around the character once they stop.
    // Each bubble has a data-show-at scrollY threshold (set in HTML) so
    // tweaking the stagger or order is just an attribute change.
    // ============================================================
    const toolBubbleEls = Array.from(document.querySelectorAll('#toolBubbles .tool-bubble'));

    function updateToolBubbles() {
      const sy = window.scrollY;
      for (const el of toolBubbleEls) {
        const showAt = parseInt(el.dataset.showAt, 10);
        el.classList.toggle('show', sy >= showAt);
      }
    }

    window.addEventListener('scroll', updateToolBubbles, { passive: true });

  </script>

</body>
</html>
